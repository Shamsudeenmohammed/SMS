{% extends "accounts/base_dashboard.html" %}
{% block title %}Add Fee Record{% endblock %}
{% block header %}💰 Add Student Fee{% endblock %}

{% block content %}

<div class="add-fee-container">
  <div class="form-box">
    <h2>Create Fee Record</h2>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="btn-save">Save Fee Record</button>
    </form>
  </div>
</div>

<!-- Select2 CSS -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<!-- jQuery + Select2 JS -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
$(document).ready(function() {

  // Apply Select2 to the Student field
  $('#id_student').select2({
    placeholder: "Search student...",
    allowClear: true,
    width: '100%',
    theme: 'classic'
  });

  // Apply Select2 to the Fee Type field
  $('#id_fee_type').select2({
    placeholder: "Search fee type...",
    allowClear: true,
    width: '100%',
    theme: 'classic'
  });

});
</script>

<style>
.add-fee-container {
  display: flex;
  justify-content: center;
  margin: 40px 0;
}

.form-box {
  width: 600px;
  background: #ffffff;
  border-radius: 16px;
  padding: 35px 40px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  transition: all 0.3s ease;
}

.form-box h2 {
  color: #004aad;
  font-size: 1.6rem;
  text-align: center;
  margin-bottom: 25px;
  letter-spacing: 0.5px;
}

form p {
  margin-bottom: 18px;
  display: flex;
  flex-direction: column;
}

form label {
  font-weight: 600;
  color: #333;
  margin-bottom: 6px;
}

form input, form select, form textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.3s;
}

form input:focus, form select:focus, form textarea:focus {
  border-color: #004aad;
}

/* Make select2 match your form style */
.select2-container .select2-selection--single {
  height: 42px !important;
  padding: 6px 10px;
  border: 1px solid #ccc !important;
  border-radius: 8px !important;
}

.select2-selection__rendered {
  line-height: 30px !important;
}

.select2-selection__arrow {
  top: 8px !important;
}

.btn-save {
  background: #004aad;
  color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  text-align: center;
  margin-top: 10px;
  transition: background 0.3s ease, transform 0.2s ease;
}

.btn-save:hover {
  background: #1565c0;
  transform: translateY(-2px);
}
</style>

{% endblock %}
