{% extends "accounts/base_dashboard.html" %}
{% load static %}
{% block title %}Start New Conversation{% endblock %}

{% block content %}
<style>
/* ===== MODERN NEW CONVO STYLING ===== */
.new-convo-wrapper {
    max-width: 650px;
    margin: 2rem auto;
    animation: fadeIn 0.4s ease-out;
}

.new-conversation-card {
    background: #ffffff;
    padding: 2.5rem;
    border-radius: 20px;
    border: 1px solid #e2e8f0;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
}

.new-conversation-card h2 {
    font-size: 1.6rem;
    font-weight: 800;
    color: #1e293b;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
}

/* ===== Form Elements ===== */
.form-section {
    margin-bottom: 1.5rem;
}

.form-section label {
    display: block;
    font-size: 0.85rem;
    font-weight: 700;
    color: #475569;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.025em;
}

.input-styled {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    font-size: 0.95rem;
    background: #f8fafc;
    transition: all 0.2s;
    outline: none;
}

.input-styled:focus {
    border-color: #1a73e8;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1);
}

/* ===== Participant Selection ===== */
.participant-container {
    border: 1.5px solid #e2e8f0;
    border-radius: 14px;
    overflow: hidden;
    background: #fff;
}

.search-bar-box {
    padding: 12px;
    background: #f1f5f9;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    align-items: center;
    gap: 10px;
}

.participant-list {
    max-height: 280px;
    overflow-y: auto;
    padding: 8px;
}

.participant-item {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
    gap: 12px;
}

.participant-item:hover {
    background: #f8fafc;
}

.participant-item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #1a73e8;
    cursor: pointer;
}

.user-info {
    display: flex;
    flex-direction: column;
}

.user-info .name {
    font-weight: 600;
    color: #1e293b;
    font-size: 0.95rem;
}

.role-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 6px;
    margin-top: 2px;
}

/* Dynamic Role Colors */
.role-admin { background: #fee2e2; color: #991b1b; }
.role-staff { background: #e0e7ff; color: #3730a3; }
.role-donor { background: #dcfce7; color: #166534; }
.role-default { background: #f1f5f9; color: #475569; }

/* ===== Actions ===== */
.actions {
    margin-top: 2rem;
    display: flex;
    justify-content: flex-end;
}

.btn-create {
    background: #1a73e8;
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
}

.btn-create:hover {
    background: #1557b0;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

<div class="new-convo-wrapper">
    <div class="new-conversation-card">
        <h2><i class="fas fa-plus-circle" style="color: #1a73e8;"></i> Start Conversation</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-section">
                <label for="id_name">Conversation Name (Optional)</label>
                <input type="text" name="name" id="id_name" class="input-styled" placeholder="e.g. Project Updates or Group Chat">
            </div>

            <div class="form-section">
                <label>Select Participants</label>
                <div class="participant-container">
                    <div class="search-bar-box">
                        <i class="fas fa-search" style="color: #94a3b8;"></i>
                        <input type="text" id="searchUser" class="input-styled" placeholder="Search by name or role..." style="border:none; background:transparent; padding: 4px;">
                        
                        <div style="display: flex; align-items: center; gap: 6px; border-left: 1px solid #cbd5e1; padding-left: 12px; margin-left: 5px;">
                            <input type="checkbox" id="selectAll" style="accent-color: #1a73e8;">
                            <label for="selectAll" style="margin:0; font-size: 0.75rem; white-space: nowrap;">All</label>
                        </div>
                    </div>

                    <div id="userList" class="participant-list">
                        {% for u in users %}
                            <label class="participant-item" data-name="{{ u.get_full_name|default:u.username }}" data-role="{{ u.role }}">
                                <input type="checkbox" name="participants" value="{{ u.pk }}">
                                <div class="user-info">
                                    <span class="name">{{ u.get_full_name|default:u.username }}</span>
                                    <span class="role-badge role-{{ u.role|default:'default' }}">
                                        {{ u.role|default:"User"|title }}
                                    </span>
                                </div>
                            </label>
                        {% empty %}
                            <div style="padding: 20px; text-align: center; color: #94a3b8;">
                                <p>No users found to start a conversation.</p>
                            </div>
                        {% endfor %}
                    </div>
                </div>
            </div>

            <div class="actions">
                <button type="submit" class="btn-create">
                    <i class="fas fa-paper-plane"></i> Create Conversation
                </button>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('searchUser');
    const selectAllCheckbox = document.getElementById('selectAll');

    // 🔍 Dynamic Search Filter
    searchInput.addEventListener('input', () => {
        const term = searchInput.value.toLowerCase();
        document.querySelectorAll('.participant-item').forEach(item => {
            const name = item.dataset.name.toLowerCase();
            const role = item.dataset.role.toLowerCase();
            item.style.display = (name.includes(term) || role.includes(term)) ? 'flex' : 'none';
        });
    });

    // ✅ Select All Toggle
    selectAllCheckbox.addEventListener('change', e => {
        const isChecked = e.target.checked;
        const visibleCheckboxes = document.querySelectorAll('.participant-item[style*="display: flex"] input[type="checkbox"], .participant-item:not([style*="display: none"]) input[type="checkbox"]');
        visibleCheckboxes.forEach(cb => {
            cb.checked = isChecked;
        });
    });
});
</script>
{% endblock %}
