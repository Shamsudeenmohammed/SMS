{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Management System{% endblock %}</title>

{% block extra_css %}
<style>
/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Tahoma, sans-serif;
}

/* ===== HEADER ===== */
header {
    background: #0a3d62;
    padding: 12px 20px;
}

.nav-container {
    max-width: 1200px;
    margin: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* ===== LOGO ===== */
.logo {
    color: #fff;
    font-size: 20px;
    font-weight: 700;
}

/* ===== NAV LINKS ===== */
.nav-links {
    list-style: none;
    display: flex;
    gap: 22px;
}

.nav-links a {
    color: #fff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
}

.nav-links a:hover {
    text-decoration: underline;
}

/* ===== TOGGLE BUTTON ===== */
.menu-toggle {
    display: none;
    font-size: 26px;
    color: white;
    cursor: pointer;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .menu-toggle {
        display: block;
    }

    .nav-links {
        position: absolute;
        top: 60px;
        right: 0;
        background: #0a3d62;
        width: 220px;
        flex-direction: column;
        gap: 15px;
        padding: 15px;
        display: none;
    }

    .nav-links.show {
        display: flex;
    }
}
</style>
{% endblock %}
</head>

<body>

<!-- ===== HEADER / NAVIGATION ===== -->
<header>
    <nav class="nav-container">
        <div class="logo">SMS Portal</div>

        <!-- Toggle Button -->
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>

        <!-- Navigation Links -->
        <ul class="nav-links" id="navMenu">
            <li><a href="{% url 'core:home' %}">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Admissions</a></li>
            <li><a href="#">Academics</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="{% url 'custom_login' %}">Login</a></li>
        </ul>
    </nav>
</header>

<!-- ===== PAGE CONTENT ===== -->
{% block content %}{% endblock %}

<script>
function toggleMenu() {
    document.getElementById("navMenu").classList.toggle("show");
}
</script>

</body>
</html>
