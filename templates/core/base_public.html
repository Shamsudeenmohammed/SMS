{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Student Management System{% endblock %}</title>

    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        body {
            background: #f8fafc;
        }

        /* ===== HEADER ===== */
        header {
            background: #0a3d62;
            padding: 10px 20px;   /* smaller height */
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* ===== LOGO ===== */
        .logo {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
        }

        /* ===== NAV LINKS ===== */
        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 6px 10px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .nav-links a:hover {
            background: rgba(255,255,255,0.15);
        }

        .login-btn {
            background: #1e90ff;
        }

        .login-btn:hover {
            background: #187bcd;
        }

        /* ===== MOBILE MENU ===== */
        .menu-toggle {
            display: none;
            font-size: 24px;
            color: white;
            cursor: pointer;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .nav-links {
                position: absolute;
                top: 60px;
                right: 0;
                background: #0a3d62;
                flex-direction: column;
                width: 220px;
                padding: 15px;
                display: none;
                box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            }

            .nav-links.show {
                display: flex;
            }

            .nav-links li {
                margin-bottom: 10px;
            }
        }

        /* ===== PAGE CONTENT ===== */
        main {
            padding: 30px 20px;
            max-width: 1200px;
            margin: auto;
        }
    </style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header>
    <div class="nav-container">
        <div class="logo">SMS Portal</div>

        <div class="menu-toggle" onclick="toggleMenu()">☰</div>

        <ul class="nav-links" id="navMenu">
            <li><a href="{% url 'core:home' %}">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Admissions</a></li>
            <li><a href="#">Academics</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="{% url 'custom_login' %}" class="login-btn">Login</a></li>
        </ul>
    </div>
</header>

<!-- ===== PAGE CONTENT ===== -->
<main>
    {% block content %}{% endblock %}
</main>

<script>
    function toggleMenu() {
        document.getElementById("navMenu").classList.toggle("show");
    }
</script>

</body>
</html>
